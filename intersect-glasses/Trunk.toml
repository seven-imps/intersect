[build]
# as of writing this there's a minification bug where the `* { box-sizing: border-box; }` part of reset.scss
# doesn't get included properly and the layout breaks
# we don't really gain anything from minification anyway since the wasm blob size eclipses all else
# so just leave it off. we don't need it.
minify = "never" # can be one of: never, on_release, always

[tools]
wasm_opt = "version_129"
